<!DOCTYPE html>
<html>
<head>
  <title>4S AI Badminton Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .container img {
      width: 100%;
      border-radius: 10px;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body style="font-family: Arial; text-align: center; background-color: #f5f5f5;">

  <h1>4S Badminton Academy</h1>
  <h2>AI Assisted Training | Structured Development | Measurable Progress</h2>
  <h2>Founder & Head Coach: Satyajeet Deshpande</h2>

  <div class="container">
    <img src="flyer1.png" style="width:90%; max-width:600px; margin:20px;"><br>
    <img src="flyer2.png" style="width:90%; max-width:600px; margin:20px;"><br>
    <img src="flyer3.png" style="width:90%; max-width:600px; margin:20px;"><br>
  </div>

  <h2>Train Smarter | Improve Faster</h2>

</body>
</html>
